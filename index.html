<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERCROWD</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: "Courier New", monospace;
}

body {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
}

#matrix { z-index: 1; }
#shatter { z-index: 2; pointer-events: none; }
#particles { z-index: 3; pointer-events: none; }

.content {
  position: relative;
  z-index: 10;
  text-align: center;
  pointer-events: none;
  padding: 0 24px;
}

.domain {
  font-size: 10px;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.28);
  text-transform: uppercase;
  margin-bottom: 20px;
}

.brand {
  font-size: clamp(30px, 6vw, 64px);
  font-weight: 900;
  letter-spacing: clamp(6px, 1vw, 12px);
  text-transform: uppercase;
  color: #ffffff;
  white-space: nowrap;
  text-shadow: 0 0 60px #000, 0 0 30px #000, 0 2px 8px #000;
}

.tagline {
  margin-top: 16px;
  font-size: clamp(10px, 1.2vw, 14px);
  letter-spacing: clamp(4px, 0.6vw, 8px);
  color: #c8a84b;
  text-transform: uppercase;
  text-shadow: 0 0 20px #000;
}

.uc {
  position: fixed;
  left: 0;
  bottom: 0;
  width: 100%;
  text-align: center;
  padding: 14px 16px;
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 8px;
  color: #cc0000;
  text-transform: uppercase;
  z-index: 20;
  text-shadow: 0 0 15px rgba(200,0,0,0.5);
  pointer-events: none;
}

#gateway {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: transparent;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="gateway" aria-label="Enter"></div>

<canvas id="matrix"></canvas>
<canvas id="shatter"></canvas>
<canvas id="particles"></canvas>

<div class="content">
  <div class="domain">cybercrowd.net</div>
  <div class="brand">CYBERCROWD</div>
  <div class="tagline">WHERE WE BELONG</div>
</div>

<div class="uc">UNDER CONSTRUCTION</div>

<script>
window.addEventListener("DOMContentLoaded", function () {
  const matrixCanvas = document.getElementById("matrix");
  const matrixCtx = matrixCanvas.getContext("2d");

  const shatterCanvas = document.getElementById("shatter");
  const shatterCtx = shatterCanvas.getContext("2d");

  const particleCanvas = document.getElementById("particles");
  const particleCtx = particleCanvas.getContext("2d");

  const gateway = document.getElementById("gateway");

  const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let matrixDrops = [];
  let transitioning = false;

  function sizeCanvases() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    matrixCanvas.width = w;
    matrixCanvas.height = h;
    shatterCanvas.width = w;
    shatterCanvas.height = h;
    particleCanvas.width = w;
    particleCanvas.height = h;
  }

  function resetMatrix() {
    matrixDrops = Array(Math.floor(matrixCanvas.width / 20)).fill(1);
  }

  function randomBetween(min, max) {
    return min + Math.random() * (max - min);
  }

  function drawMatrix() {
    matrixCtx.fillStyle = "rgba(0,0,0,0.08)";
    matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

    matrixCtx.fillStyle = "#4f4";
    matrixCtx.font = "14px monospace";

    for (let i = 0; i < matrixDrops.length; i++) {
      const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
      matrixCtx.fillText(char, i * 20, matrixDrops[i] * 20);

      if (matrixDrops[i] * 20 > matrixCanvas.height && Math.random() > 0.975) {
        matrixDrops[i] = 0;
      }

      matrixDrops[i]++;
    }
  }

  function drawShards() {
    shatterCtx.clearRect(0, 0, shatterCanvas.width, shatterCanvas.height);

    for (let i = 0; i < 18; i++) {
      const cx = randomBetween(0, shatterCanvas.width);
      const cy = randomBetween(0, shatterCanvas.height);
      const w = randomBetween(40, 220);
      const h = randomBetween(20, 120);
      const angle = randomBetween(-0.6, 0.6);
      const alpha = randomBetween(0.03, 0.12);

      shatterCtx.save();
      shatterCtx.translate(cx, cy);
      shatterCtx.rotate(angle);

      shatterCtx.strokeStyle = "rgba(200,168,75," + alpha + ")";
      shatterCtx.lineWidth = 1;
      shatterCtx.strokeRect(-w / 2, -h / 2, w, h);

      shatterCtx.beginPath();
      shatterCtx.moveTo(
        -w / 2 + randomBetween(0, w * 0.4),
        randomBetween(-h / 2, h / 2)
      );
      shatterCtx.lineTo(
        w / 2 - randomBetween(0, w * 0.4),
        randomBetween(-h / 2, h / 2)
      );
      shatterCtx.strokeStyle = "rgba(255,255,255," + (alpha + 0.5) + ")";
      shatterCtx.stroke();

      shatterCtx.restore();
    }
  }

  const particles = Array.from({ length: 120 }, function () {
    return {
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: Math.random() - 0.5,
      vy: Math.random() - 0.5
    };
  });

  function animateParticles() {
    particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0 || p.x > particleCanvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > particleCanvas.height) p.vy *= -1;

      particleCtx.fillStyle = "rgba(255,255,255,0.2)";
      particleCtx.fillRect(p.x, p.y, 2, 2);
    }

    requestAnimationFrame(animateParticles);
  }

  function enterScene(event) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }

    if (transitioning) return;
    transitioning = true;
    gateway.style.pointerEvents = "none";

    const burst = setInterval(drawShards, 80);

    setTimeout(function () {
      clearInterval(burst);
      window.location.href = "page2.html";
    }, 1200);
  }

  sizeCanvases();
  resetMatrix();
  drawShards();
  animateParticles();

  setInterval(drawMatrix, 60);
  setInterval(drawShards, 3000);

  window.addEventListener("resize", function () {
    sizeCanvases();
    resetMatrix();
  });

  gateway.addEventListener("pointerdown", enterScene, { passive: false });
});
</script>

</body>
</html>
