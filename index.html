  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">

  <style>
    :root {
      --tile-size: clamp(22px, 7vw, 28px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      width: 100%;
      min-height: 100%;
      background: black;
    }

    body {
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      padding: 26px 12px 48px;
      overflow: hidden;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    canvas#bgrain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    h1 {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      color: #FFFFFF;
      font-size: clamp(40px, 12vw, 90px);
      margin-bottom: 0;
      margin-left: 20px;
      letter-spacing: 2px;
      position: relative;
      z-index: 10;
      user-select: none;
    }

    .enter-graphic {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      font-size: 0.9rem;
      letter-spacing: 5px;
      color: #7CFF7C;
      border: 2px solid #7CFF7C;
      padding: 6px 24px;
      margin-bottom: 8px;
      margin-top: -12px;
      position: relative;
      z-index: 10;
      display: inline-block;
      pointer-events: none;
      transition: color 0.2s, border-color 0.2s, text-shadow 0.2s, box-shadow 0.2s;
      user-select: none;
    }

    .enter-graphic.lit {
      color: #fff;
      border-color: #7CFF7C;
      text-shadow: 0 0 18px #7CFF7C, 0 0 40px #7CFF7C;
      box-shadow: 0 0 24px rgba(124,255,124,0.7);
    }

    .scene {
      position: relative;
      display: inline-block;
      z-index: 2;
      user-select: none;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(10, var(--tile-size));
      grid-template-rows: repeat(10, var(--tile-size));
      position: relative;
      z-index: 1;
    }

    .tile {
      width: var(--tile-size);
      height: var(--tile-size);
      background-image: url("https://pub-081cb3c244be4e09b5e76012567a0b0a.r2.dev/image-4.png");
      background-size: 280px 280px;
      animation: tron var(--dur) var(--delay) ease-in-out infinite;
    }

    @keyframes tron {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
      35%  { transform: translate(var(--ex), var(--ey)) rotate(360deg); opacity: 0.9; }
      55%  { transform: translate(var(--bx), var(--by)) rotate(450deg); opacity: 0.9; }
      80%  { transform: translate(0,0) rotate(720deg); opacity: 1; }
      82%  { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(0,0) rotate(0deg); opacity: 1; }
    }

    .banner {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(90deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 100%);
      padding: 5px 10px;
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 3px;
      color: #FFD700;
      text-transform: uppercase;
      border-top: 1px solid rgba(255,215,0,0.3);
      text-shadow: 0 0 10px rgba(255,215,0,0.6);
      z-index: 10;
      pointer-events: none;
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      text-align: center;
      padding: 8px;
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 5px;
      color: #FF0000;
      background: rgba(0,0,0,0.75);
      border-top: 1px solid rgba(255,0,0,0.25);
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
      z-index: 99;
      pointer-events: none;
      user-select: none;
    }

    .seo-identity {
      position: fixed;
      top: 6px;
      left: 0;
      width: 100%;
      z-index: 100;
      color: #7CFF7C;
      background: transparent;
      border: none;
      padding: 0;
      max-width: none;
      font-family: Arial, sans-serif;
      font-size: 12px;
      line-height: 1;
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    .seo-identity h2 {
      font-size: 12px;
      font-weight: 400;
      margin: 0;
      color: #7CFF7C;
    }

    .seo-identity p {
      display: none;
    }

    @media (max-height: 520px) {
      :root {
        --tile-size: 20px;
      }

      h1 {
        font-size: 34px;
      }

      .enter-graphic {
        font-size: 0.75rem;
        padding: 4px 18px;
        margin-top: -8px;
      }

      .footer {
        padding: 5px;
        font-size: 11px;
      }
    }
  </style>
</head>

  <canvas id="bgrain"></canvas>
