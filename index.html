<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERCROWD</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#000;
  width:100vw;
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Courier New', monospace;
}

canvas {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

#matrix { z-index:1; }
#shatter { z-index:2; pointer-events:none; }
#particles { z-index:3; pointer-events:none; }

.content {
  position:relative;
  z-index:10;
  text-align:center;
  pointer-events:none;
}

/* TOP TITLE */
.domain {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: clamp(26px, 6vw, 42px);
  letter-spacing: 6px;
  color: rgba(255,255,255,0.95);
  text-transform: uppercase;
  font-weight: 900;
  text-shadow: 0 0 30px #000, 0 0 12px #000;
  z-index: 30;
  white-space: nowrap;
}

/* ENTER BUTTON */
#welcome-overlay {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.55);
  z-index: 999;
}

#welcome-btn {
  background: transparent;
  color: #c8a84b;
  border: 1px solid #c8a84b;
  padding: 6px 12px;
  font-size: 12px;
  letter-spacing: 1px;
  cursor: pointer;
  text-transform: uppercase;
}

/* PAGE 2 */
#patreon-overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.55);
  z-index: 998;
}

#patreon-link {
  text-decoration: none;
  color: #c8a84b;
  border: 1px solid #c8a84b;
  padding: 10px 18px;
  font-size: 16px;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: rgba(0,0,0,0.35);
}

.tagline {
  margin-top:16px;
  font-size:clamp(9px,2vw,13px);
  letter-spacing:8px;
  color:#c8a84b;
  text-transform:uppercase;
}

.uc {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  text-align:center;
  padding:13px;
  font-size:13px;
  font-weight:900;
  letter-spacing:8px;
  color:#cc0000;
  text-transform:uppercase;
  z-index:20;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="welcome-overlay">
  <button id="welcome-btn">ENTER</button>
</div>

<!-- PAGE 2 -->
<div id="patreon-overlay">
  <a href="https://patreon.com/cybercrowd" target="_blank" id="patreon-link">
    PATREON
  </a>
</div>

<!-- BACKGROUND -->
<canvas id="matrix"></canvas>
<canvas id="shatter"></canvas>
<canvas id="particles"></canvas>

<!-- CONTENT -->
<div class="content">
  <div class="domain">CYBERCROWD</div>
  <div class="tagline">WHERE WE BELONG</div>
</div>

<div class="uc">UNDER CONSTRUCTION</div>

<script>
const mc = document.getElementById("matrix");
const mx = mc.getContext("2d");
mc.width = window.innerWidth;
mc.height = window.innerHeight;

const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
const drops = Array(Math.floor(mc.width / 20)).fill(1);

function drawMatrix() {
  mx.fillStyle = "rgba(0,0,0,0.08)";
  mx.fillRect(0, 0, mc.width, mc.height);
  mx.fillStyle = "#6f5";
  mx.font = "16px monospace";

  for (let i = 0; i < drops.length; i++) {
    const ch = chars[Math.floor(Math.random() * chars.length)];
    mx.fillText(ch, i * 20, drops[i] * 20);
    if (drops[i] * 20 > mc.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 60);

/* CLICK FLOW */
const welcomeBtn = document.getElementById("welcome-btn");
const welcomeOverlay = document.getElementById("welcome-overlay");
const patreonOverlay = document.getElementById("patreon-overlay");

welcomeBtn.addEventListener("click", () => {
  welcomeOverlay.style.display = "none";
  patreonOverlay.style.display = "flex";
});
</script>

<audio id="bg-audio" loop preload="auto">
  <source src="https://pub-177f7e99181349cbb8fef11b0137ea29.r2.dev/cybercrowd.mp3" type="audio/mpeg">
</audio>

</body>
</html>
