<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybercrowd</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    h1 {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      font-size: 64px;
      letter-spacing: 15px;
      color: #00FF00;
      text-shadow: 0 0 20px rgba(0,255,0,0.7);
      margin-bottom: 20px;
      z-index: 10;
      position: relative;
    }
    #bgrain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .enter-btn {
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 5px;
      color: #00FF00;
      background: transparent;
      border: 1px solid rgba(0,255,0,0.5);
      padding: 6px 24px;
      text-decoration: none;
      margin-bottom: 8px;
      margin-top: -12px;
      position: relative;
      z-index: 10;
      display: inline-block;
    }
    .scene {
      position: relative;
      display: inline-block;
      z-index: 2;
    }
    #grid {
      display: grid;
      grid-template-columns: repeat(10, 28px);
      grid-template-rows: repeat(10, 28px);
      position: relative;
      z-index: 1;
    }
    .tile {
      width: 28px;
      height: 28px;
      /* SWAPPED GREEN FOR YOUR IMAGE */
      background-image: url('https://pub-081cb3c244be4e09b5e76012567a0b0a.r2.dev/image-4.png');
      background-size: cover;
      animation: tron var(--dur, 5s) linear infinite;
      animation-delay: var(--delay, 0s);
    }
    @keyframes tron {
      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
      35%  { transform: translate(var(--ex), var(--ey)) rotate(360deg); opacity: 0.9; }
      55%  { transform: translate(var(--bx), var(--by)) rotate(450deg); opacity: 0.9; }
      80%  { transform: translate(0,0) rotate(720deg); opacity: 1; }
      82%  { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(0,0) rotate(0deg); opacity: 1; }
    }
    .banner {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      background: linear-gradient(90deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 100%);
      padding: 5px 10px;
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 3px;
      color: #FFD700;
      text-transform: uppercase;
      border-top: 1px solid rgba(255,215,0,0.3);
      text-shadow: 0 0 10px rgba(255,215,0,0.6);
      z-index: 10;
    }
    .footer {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      text-align: center;
      padding: 8px;
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      font-size: 13px;
      letter-spacing: 5px;
      color: #FF0000;
      background: rgba(0,0,0,0.75);
      border-top: 1px solid rgba(255,0,0,0.25);
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
      z-index: 99;
    }
  </style>
</head>
<body>
  <canvas id="bgrain"></canvas>
  <h1>CYBERCROWD</h1>
  <a href="#" class="enter-btn">ENTER</a>
  <div class="scene">
    <div id="grid"></div>
    <div class="banner">WHERE WE BELONG</div>
  </div>
  <div class="footer">⚠ UNDER CONSTRUCTION ⚠</div>
  <audio id="cc-audio" preload="auto" loop>
    <source src="https://pub-177f7e99181349cbb8fef11b0137ea29.r2.dev/Cybercrowd_60s.teaser.mp3" type="audio/mpeg">
  </audio>
  <script>
    const chars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ01";
    const bgrain = document.getElementById("bgrain");
    const bgctx = bgrain.getContext("2d");
    bgrain.width = window.innerWidth;
    bgrain.height = window.innerHeight;
    const bgdrops = Array(Math.floor(bgrain.width / 14)).fill(0).map(() => Math.random() * -80);
    function drawBgRain() {
      bgctx.fillStyle = "rgba(0,0,0,0.05)";
      bgctx.fillRect(0, 0, bgrain.width, bgrain.height);
      bgctx.fillStyle = "#7CFF7C";
      bgctx.font = "14px monospace";
      bgdrops.forEach((d, i) => {
        bgctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 14, d * 14);
        if (d * 14 > bgrain.height && Math.random() > 0.975) bgdrops[i] = 0;
        else bgdrops[i]++;
      });
    }
    setInterval(drawBgRain, 40);
    window.addEventListener("resize", () => {
      bgrain.width = window.innerWidth;
      bgrain.height = window.innerHeight;
    });
    const grid = document.getElementById("grid");
    const cols = 10, rows = 10, tileSize = 28;
    const cx = (cols - 1) / 2, cy = (rows - 1) / 2;
    const maxDist = Math.sqrt(cx * cx + cy * cy);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const tile = document.createElement("div");
        tile.className = "tile";
        const dx = c - cx, dy = r - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const travel = (dist / maxDist) * 48;
        tile.style.setProperty("--ex", (Math.cos(angle) * travel).toFixed(1) + "px");
        tile.style.setProperty("--ey", (Math.sin(angle) * travel).toFixed(1) + "px");
        tile.style.setProperty("--bx", (Math.cos(angle) * travel * -0.3).toFixed(1) + "px");
        tile.style.setProperty("--by", (Math.sin(angle) * travel * -0.3).toFixed(1) + "px");
        tile.style.setProperty("--delay", (((maxDist - dist) / maxDist) * 0.3).toFixed(2) + "s");
        tile.style.setProperty("--dur", "5s");
        grid.appendChild(tile);
      }
    }
    const audio = document.getElementById("cc-audio");
    function unlockAudio() {
      audio.muted = false;
      audio.play().catch(() => {});
    }
    document.querySelector(".enter-btn").addEventListener("click", e => {
      e.preventDefault();
      unlockAudio();
      window.location.href = "page2.html"; 
    });
    window.addEventListener("click", unlockAudio, { once: true });
  </script>
</body>
</html>
