
<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYBERCROWD</title>



<style>

/* This part handles the look and colors */

* { margin: 0; padding: 0; box-sizing: border-box; }

body {

  background: #000;

  width: 100vw;

  height: 100vh;

  overflow: hidden;

  display: flex;

  align-items: center;

  justify-content: center;

  font-family: "Courier New", monospace;

}

canvas#c {

  position: absolute;

  inset: 0;

  width: 100%;

  height: 100%;

  z-index: 1;

}

.content {

  position: relative;

  z-index: 10;

  text-align: center;

  pointer-events: none;

}

.domain {

  font-size: 10px;

  letter-spacing: 5px;

  color: rgba(255, 255, 255, 0.3);

  text-transform: uppercase;

  margin-bottom: 20px;

}

.brand {

  font-size: clamp(26px, 6.5vw, 54px);

  font-weight: 900;

  letter-spacing: 10px;

  text-transform: uppercase;

  color: #fff;

  white-space: nowrap;

  text-shadow: 0 0 20px rgba(0,0,0,0.8);

}

.tagline {

  margin-top: 16px;

  font-size: clamp(9px, 2vw, 13px);

  letter-spacing: 8px;

  color: #c8a84b; /* That gold color you like */

  text-transform: uppercase;

}

</style>

</head>



<body>



<canvas id="c"></canvas>



<div class="content">

  <div class="domain">cybercrowd.io</div>

  <div class="brand">CYBERCROWD</div>

  <div class="tagline">The Digital Collective</div>

</div>



<script>

/* This part handles the moving animation */

const canvas = document.getElementById('c');

const ctx = canvas.getContext('2d');

let particles = [];

function resize() {

  canvas.width = window.innerWidth;

  canvas.height = window.innerHeight;

  particles = [];

  for (let i = 0; i < 80; i++) {

    particles.push({

      x: Math.random() * canvas.width,

      y: Math.random() * canvas.height,

      vx: (Math.random() - 0.5) * 0.5,

      vy: (Math.random() - 0.5) * 0.5

    });

  }

}

function animate() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < particles.length; i++) {

    let p1 = particles[i];

    p1.x += p1.vx; p1.y += p1.vy;

    if (p1.x < 0 || p1.x > canvas.width) p1.vx *= -1;

    if (p1.y < 0 || p1.y > canvas.height) p1.vy *= -1;

    for (let j = i + 1; j < particles.length; j++) {

      let p2 = particles[j];

      let dist = Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);

      if (dist < 120) {

        ctx.beginPath();

        ctx.strokeStyle = `rgba(200, 168, 75, ${1 - dist / 120})`;

        ctx.lineWidth = 0.5;

        ctx.moveTo(p1.x, p1.y);

        ctx.lineTo(p2.x, p2.y);

        ctx.stroke();

      }

    }

  }

  requestAnimationFrame(animate);

}

window.addEventListener('resize', resize);

resize();

animate();

</script>



</body>

</html>
