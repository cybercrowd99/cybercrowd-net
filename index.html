<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CYBERCROWD</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#00ff99;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}.content{position:relative;z-index:1;text-align:center;padding:20px}.logo{font-size:clamp(2.5rem,10vw,6rem);font-weight:900;letter-spacing:.2em;color:#00ff99;text-shadow:0 0 20px #00ff99,0 0 40px #00ff99;animation:pulse 2s ease-in-out infinite}.tag{font-size:clamp(.8rem,3vw,1.2rem);color:#00ccff;letter-spacing:.4em;margin-top:10px}.divider{width:80%;max-width:400px;height:1px;background:linear-gradient(to right,transparent,#00ff99,transparent);margin:30px auto}.tagline{font-size:clamp(.7rem,2.5vw,1rem);color:#888;letter-spacing:.2em;text-transform:uppercase}.badge{display:inline-block;margin-top:30px;padding:10px 24px;border:1px solid #00ff99;color:#00ff99;font-size:.75rem;letter-spacing:.3em;text-transform:uppercase}@keyframes pulse{0%,100%{text-shadow:0 0 20px #00ff99,0 0 40px #00ff99}50%{text-shadow:0 0 40px #00ff99,0 0 80px #00ff99,0 0 120px #00ff99}}</style></head><body><canvas id="matrix"></canvas><div class="content"><div class="logo">CYBERCROWD</div><div class="tag">@CYBERCROWD99</div><div class="divider"></div><div class="tagline">Creator-Owned Platform Ecosystem</div><div class="badge">CC-IP-MASTER-001 | EST. 1996</div></div><script>const c=document.getElementById('matrix'),x=c.getContext('2d');function resize(){c.width=window.innerWidth;c.height=window.innerHeight}resize();window.addEventListener('resize',resize);const cols=()=>Math.floor(c.width/20);let d=Array(cols()).fill(1);window.addEventListener('resize',()=>{d=Array(cols()).fill(1)});setInterval(()=>{x.fillStyle='rgba(0,0,0,0.05)';x.fillRect(0,0,c.width,c.height);x.fillStyle='#00ff9933';x.font='15px monospace';d.forEach((y,i)=>{x.fillText(String.fromCharCode(0x30A0+Math.random()*96),i*20,y*20);if(y*20>c.height&&Math.random()>.975)d[i]=0;d[i]++;});},33);</script></body></html>
