<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CYBERCROWD</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      width:100vw;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Courier New', monospace;
    }
    canvas#c {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:1;
    }
    .content {
      position:relative;
      z-index:10;
      text-align:center;
      pointer-events:none;
    }
    .domain {
      font-size:10px;
      letter-spacing:5px;
      color:rgba(255,255,255,0.3);
      text-transform:uppercase;
      margin-bottom:20px;
    }
    .brand {
      font-size:clamp(26px,6.5vw,54px);
      font-weight:900;
      letter-spacing:10px;
      text-transform:uppercase;
      color:#fff;
      white-space:nowrap;
      text-shadow:0 0 60px #000, 0 0 30px #000, 0 2px 8px #000;
    }
    .tagline {
      margin-top:16px;
      font-size:clamp(9px,2vw,13px);
      letter-spacing:8px;
      color:#c8a84b;
      text-transform:uppercase;
      text-shadow:0 0 20px #000;
    }
    .uc {
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      text-align:center;
      padding:13px;
      font-size:13px;
      font-weight:900;
      letter-spacing:8px;
      color:#cc0000;
      text-transform:uppercase;
      z-index:20;
      text-shadow:0 0 15px rgba(200,0,0,0.5);
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="content">
  <div class="domain">cybercrowd.net</div>
  <div class="brand">CYBERCROWD</div>
  <div class="tagline">WHERE WE BELONG</div>
</div>

<div class="uc">UNDER CONSTRUCTION</div>

<script>
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  for (let i = 0; i < 120; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 1,
      vy: (Math.random() - 0.5) * 1
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
      ctx.fillStyle = "rgba(255,255,255,0.2)";
      ctx.fillRect(p.x, p.y, 2, 2);
    });
    requestAnimationFrame(animate);
  }

  animate();

  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>

</body>
</html>
