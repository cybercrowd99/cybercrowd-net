<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cybercrowd</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      cursor: pointer; /* Shows the user they can click anywhere */
    }
    
    /* The Matrix "Rain" Background */
    #bgrain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Main Title */
    h1 {
      position: absolute;
      top: 10%;
      width: 100%;
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      font-size: clamp(40px, 10vw, 80px);
      letter-spacing: 10px;
      color: #00FF00;
      text-shadow: 0 0 20px rgba(0,255,0,0.7);
      text-align: center;
      z-index: 10;
    }

    /* The Image Container - Made Larger */
    .scene {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(500px, 90vw); /* Larger size */
      height: min(500px, 90vw);
      z-index: 2;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(10, 1fr);
      width: 100%;
      height: 100%;
    }

    .tile {
      width: 100%;
      height: 100%;
      background-image: url('https://pub-081cb3c244be4e09b5e76012567a0b0a.r2.dev/image-4.png');
      background-repeat: no-repeat;
      transition: transform 2s cubic-bezier(0.2, 0, 0.2, 1), opacity 2s;
    }

    /* This class triggers the "Busting Apart" effect */
    .busted .tile {
      transform: translate(var(--ex), var(--ey)) rotate(var(--rot));
      opacity: 0;
    }

    .banner {
      position: absolute;
      bottom: -40px;
      width: 100%;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      font-family: "Playfair Display", serif;
      font-style: italic;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 4px;
      color: #FFD700;
      text-align: center;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="bgrain"></canvas>
  <h1>CYBERCROWD</h1>
  
  <div class="scene" id="main-scene">
    <div id="grid"></div>
    <div class="banner">WHERE WE BELONG</div>
  </div>

  <audio id="cc-audio" preload="auto">
    <source src="https://pub-177f7e99181349cbb8fef11b0137ea29.r2.dev/Cybercrowd_60s.teaser.mp3" type="audio/mpeg">
  </audio>

  <script>
    // 1. Matrix Rain Logic
    const chars = "0101010101010101"; // Simplified for "rus rain" look
    const bgrain = document.getElementById("bgrain");
    const bgctx = bgrain.getContext("2d");
    
    function resize() {
      bgrain.width = window.innerWidth;
      bgrain.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    const bgdrops = Array(Math.floor(window.innerWidth / 20)).fill(0);
    function drawBgRain() {
      bgctx.fillStyle = "rgba(0,0,0,0.1)";
      bgctx.fillRect(0, 0, bgrain.width, bgrain.height);
      bgctx.fillStyle = "#0F0";
      bgctx.font = "20px monospace";
      bgdrops.forEach((y, i) => {
        const text = chars[Math.floor(Math.random() * chars.length)];
        bgctx.fillText(text, i * 20, y * 20);
        if (y * 20 > bgrain.height && Math.random() > 0.975) bgdrops[i] = 0;
        else bgdrops[i]++;
      });
    }
    setInterval(drawBgRain, 50);

    // 2. Grid Setup
    const grid = document.getElementById("grid");
    function setupGrid() {
      grid.innerHTML = '';
      const size = document.getElementById('main-scene').offsetWidth;
      for (let r = 0; r < 10; r++) {
        for (let c = 0; c < 10; c++) {
          const tile = document.createElement("div");
          tile.className = "tile";
          tile.style.backgroundSize = `${size}px ${size}px`;
          tile.style.backgroundPosition = `-${c * 10}% -${r * 10}%`;
          
          // Random explosion directions
          const angle = Math.random() * Math.PI * 2;
          const dist = 500 + Math.random() * 1000;
          tile.style.setProperty("--ex", Math.cos(angle) * dist + "px");
          tile.style.setProperty("--ey", Math.sin(angle) * dist + "px");
          tile.style.setProperty("--rot", (Math.random() * 720 - 360) + "deg");
          
          grid.appendChild(tile);
        }
      }
    }
    setupGrid();

    // 3. Two-Touch Logic
    let touchCount = 0;
    const audio = document.getElementById("cc-audio");
    const scene = document.getElementById("main-scene");

    window.addEventListener("click", () => {
      touchCount++;
      
      if (touchCount === 1) {
        // First Touch: Play Audio and Bust Apart
        audio.play();
        scene.classList.add("busted");
      } else if (touchCount === 2) {
        // Second Touch: Go to next page
        window.location.href = "page2.html"; 
      }
    });
  </script>
</body>
</html>
