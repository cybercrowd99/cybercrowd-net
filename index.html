  <style>

    * { margin: 0; padding: 0; box-sizing: border-box; }



    body {

      background: black;

      display: flex;

      flex-direction: column;

      justify-content: center;

      align-items: center;

      min-height: 100vh;

      overflow: hidden;

      cursor: pointer;

      touch-action: manipulation;

    }



    canvas#bgrain {

      position: fixed;

      top: 0;

      left: 0;

      width: 100vw;

      height: 100vh;

      z-index: 0;

      pointer-events: none;

    }



    h1 {

      font-family: "Playfair Display", serif;

      font-style: italic;

      font-weight: 900;

      color: #FFFFFF;

      font-size: clamp(40px, 12vw, 90px);

      margin-bottom: 0px;

      margin-left: 20px;

      letter-spacing: 2px;

      position: relative;

      z-index: 10;

      user-select: none;

    }



    .enter-graphic {

      font-family: "Playfair Display", serif;

      font-style: italic;

      font-weight: 900;

      font-size: 0.9rem;

      letter-spacing: 5px;

      color: #7CFF7C;

      border: 2px solid #7CFF7C;

      padding: 6px 24px;

      margin-bottom: 8px;

      margin-top: -12px;

      position: relative;

      z-index: 10;

      display: inline-block;

      pointer-events: none;

      transition: color 0.2s, border-color 0.2s, text-shadow 0.2s, box-shadow 0.2s;

      user-select: none;

    }



    .enter-graphic.lit {

      color: #fff;

      border-color: #7CFF7C;

      text-shadow: 0 0 18px #7CFF7C, 0 0 40px #7CFF7C;

      box-shadow: 0 0 24px rgba(124,255,124,0.7);

    }



    .scene {

      position: relative;

      display: inline-block;

      z-index: 2;

      user-select: none;

    }



    #grid {

      display: grid;

      grid-template-columns: repeat(10, 28px);

      grid-template-rows: repeat(10, 28px);

      position: relative;

      z-index: 1;

    }



    .tile {

      width: 28px;

      height: 28px;

      background-image: url("https://pub-081cb3c244be4e09b5e76012567a0b0a.r2.dev/image-4.png");

      background-size: 280px 280px;

      animation: tron var(--dur) var(--delay) ease-in-out infinite;

    }



    @keyframes tron {

      0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }

      35%  { transform: translate(var(--ex), var(--ey)) rotate(360deg); opacity: 0.9; }

      55%  { transform: translate(var(--bx), var(--by)) rotate(450deg); opacity: 0.9; }

      80%  { transform: translate(0,0) rotate(720deg); opacity: 1; }

      82%  { transform: translate(0,0) rotate(0deg); opacity: 1; }

      100% { transform: translate(0,0) rotate(0deg); opacity: 1; }

    }



    .banner {

      position: absolute;

      bottom: 0;

      left: 0;

      width: 100%;

      background: linear-gradient(90deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.4) 100%);

      padding: 5px 10px;

      font-family: "Playfair Display", serif;

      font-style: italic;

      font-weight: 900;

      font-size: 11px;

      letter-spacing: 3px;

      color: #FFD700;

      text-transform: uppercase;

      border-top: 1px solid rgba(255,215,0,0.3);

      text-shadow: 0 0 10px rgba(255,215,0,0.6);

      z-index: 10;

      pointer-events: none;

    }



    .footer {

      position: fixed;

      bottom: 0;

      left: 0;

      width: 100%;

      text-align: center;

      padding: 8px;

      font-family: "Playfair Display", serif;

      font-style: italic;

      font-weight: 900;

      font-size: 13px;

      letter-spacing: 5px;

      color: #FF0000;

      background: rgba(0,0,0,0.75);

      border-top: 1px solid rgba(255,0,0,0.25);

      text-shadow: 0 0 10px rgba(255,0,0,0.5);

      z-index: 99;

      pointer-events: none;

      user-select: none;

    }

<body>

  <audio id="bg-audio" preload="auto" loop playsinline>

    <source src="https://pub-660d879738134ba990d1708d015ec763.r2.dev/Cybercrowd_60s.teaser.mp3" type="audio/mpeg">

  </audio>



  <canvas id="bgrain"></canvas>



  <h1>CYBERCROWD</h1>



  <div class="enter-graphic" id="enter-graphic">ENTER</div>



  <div class="scene">

    <div id="grid"></div>

    <div class="banner">WHERE WE BELONG</div>

  </div>



  <div class="footer">⚠ UNDER CONSTRUCTION ⚠</div>



  <script>

    /*

      CYBERCROWD INDEX.HTML

      Locked behavior:



      1. Window 1 opens silent on purpose.

      2. First real touch/click starts Cybercrowd_60s.teaser.mp3.

      3. User stays on Window 1 and can listen.

      4. Second real touch/click goes to Window 2 placard.

      5. This is an interactive two-touch audio gate, not a static page.

    */



    const chars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ01";



    const bgrain = document.getElementById("bgrain");

    const bgctx = bgrain.getContext("2d");



    function sizeRainCanvas() {

      bgrain.width = window.innerWidth;

      bgrain.height = window.innerHeight;

    }



    sizeRainCanvas();



    let bgdrops = Array(Math.floor(bgrain.width / 14)).fill(0).map(() => Math.random() * -80);



    function resetRainDrops() {

      bgdrops = Array(Math.floor(bgrain.width / 14)).fill(0).map(() => Math.random() * -80);

    }



    function drawBgRain() {

      bgctx.fillStyle = "rgba(0,0,0,0.05)";

      bgctx.fillRect(0, 0, bgrain.width, bgrain.height);



      bgctx.fillStyle = "#7CFF7C";

      bgctx.font = "14px monospace";



      bgdrops.forEach((d, i) => {

        bgctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 14, d * 14);



        if (d * 14 > bgrain.height && Math.random() > 0.975) {

          bgdrops[i] = 0;

        } else {

          bgdrops[i]++;

        }

      });

    }



    setInterval(drawBgRain, 40);



    window.addEventListener("resize", () => {

      sizeRainCanvas();

      resetRainDrops();

    });



    const grid = document.getElementById("grid");

    const cols = 10;

    const rows = 10;

    const tileSize = 28;

    const cx = (cols - 1) / 2;

    const cy = (rows - 1) / 2;

    const maxDist = Math.sqrt(cx * cx + cy * cy);



    for (let r = 0; r < rows; r++) {

      for (let c = 0; c < cols; c++) {

        const tile = document.createElement("div");

        tile.className = "tile";

        tile.style.backgroundPosition = (-c * tileSize) + "px " + (-r * tileSize) + "px";



        const dx = c - cx;

        const dy = r - cy;

        const dist = Math.sqrt(dx * dx + dy * dy);

        const angle = Math.atan2(dy, dx);

        const travel = (dist / maxDist) * 48;



        tile.style.setProperty("--ex", (Math.cos(angle) * travel).toFixed(1) + "px");

        tile.style.setProperty("--ey", (Math.sin(angle) * travel).toFixed(1) + "px");

        tile.style.setProperty("--bx", (Math.cos(angle) * travel * -0.3).toFixed(1) + "px");

        tile.style.setProperty("--by", (Math.sin(angle) * travel * -0.3).toFixed(1) + "px");

        tile.style.setProperty("--delay", (((maxDist - dist) / maxDist) * 0.3).toFixed(2) + "s");

        tile.style.setProperty("--dur", "5s");



        grid.appendChild(tile);

      }

    }



    const bgAudio = document.getElementById("bg-audio");

    const enterGraphic = document.getElementById("enter-graphic");



    const NEXT_PAGE_URL = "page2.html";



    let gateState = "WAITING_FOR_AUDIO";

    let navigating = false;

    let audioStartedAt = 0;

    let lastAudioAttemptAt = 0;



    function setEnterText(text) {

      if (!enterGraphic) return;

      enterGraphic.textContent = text;

    }



    function lightEnter() {

      if (!enterGraphic) return;

      enterGraphic.classList.add("lit");

    }



    function dimEnter() {

      if (!enterGraphic) return;

      enterGraphic.classList.remove("lit");

    }



    async function startCybercrowdTeaser() {

      if (!bgAudio) {

        console.error("CyberCrowd audio error: #bg-audio was not found.");

        setEnterText("NO AUDIO");

        gateState = "WAITING_FOR_AUDIO";

        return false;

      }



      try {

        bgAudio.muted = false;

        bgAudio.volume = 1;

        bgAudio.setAttribute("playsinline", "");

        bgAudio.setAttribute("webkit-playsinline", "");



        if (bgAudio.readyState === 0) {

          bgAudio.load();

        }



        try {

          bgAudio.currentTime = 0;

        } catch (seekErr) {

          console.warn("CyberCrowd teaser seek warning:", seekErr);

        }



        await bgAudio.play();



        gateState = "AUDIO_PLAYING";

        audioStartedAt = Date.now();



        lightEnter();

        setEnterText("ENTER");



        console.log("CyberCrowd teaser audio started. Staying on Window 1.");

        return true;



      } catch (err) {

        gateState = "WAITING_FOR_AUDIO";

        dimEnter();

        setEnterText("TAP AGAIN");



        console.error("CyberCrowd teaser audio failed to start:", err);

        return false;

      }

    }



    async function cybercrowdGateTouch(e) {

      if (e && typeof e.preventDefault === "function") {

        e.preventDefault();

      }



      if (navigating) return;



      const now = Date.now();



      /*

        First touch:

        Start audio only.

        Stay on index.html.

      */

      if (gateState === "WAITING_FOR_AUDIO") {

        if (now - lastAudioAttemptAt < 250) return;



        lastAudioAttemptAt = now;

        setEnterText("ARMING");



        await startCybercrowdTeaser();

        return;

      }



      /*

        Same physical touch can sometimes fire pointerup + click.

        This guard prevents the first touch from starting audio AND navigating.

      */

      if (gateState === "AUDIO_PLAYING" && now - audioStartedAt < 900) {

        return;

      }



      /*

        Second touch:

        Go to Window 2 placard.

      */

      if (gateState === "AUDIO_PLAYING") {

        navigating = true;

        setEnterText("ENTERING");

        window.location.href = NEXT_PAGE_URL;

      }

    }



    /*

      Main input for desktop, phone, tablet, and Oculus/Meta Quest browser.

      Click is the safest browser audio-unlock gesture.

    */

    document.addEventListener("click", cybercrowdGateTouch, false);



    /*

      VR / mobile backup.

      If this succeeds before click fires, the 900ms guard prevents same-tap navigation.

    */

    document.addEventListener("pointerup", cybercrowdGateTouch, false);



    /*

      Desktop keyboard backup.

    */

    document.addEventListener("keydown", async (e) => {

      if (e.key === "Enter" || e.key === " ") {

        await cybercrowdGateTouch(e);

      }

    });

  </script>
